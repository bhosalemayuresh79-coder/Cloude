name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # नवीन व्हर्जन

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create package.json if missing
        run: |
          if [ ! -f package.json ]; then
            echo '{"name":"mayuresh-app","version":"1.0.0","dependencies":{"@capacitor/android":"^5.0.0","@capacitor/cli":"^5.0.0","@capacitor/core":"^5.0.0"}}' > package.json
          fi

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: |
          mkdir -p www
          # तुझ्या मुख्य फाईलचे नाव जर index.html नसेल तर ते तपासून घे
          cp *.html www/ 2>/dev/null || true
          cp -r assets www/ 2>/dev/null || true

      - name: Capacitor Init and Sync
        run: |
          npx cap init "MayureshGarments" "com.mayuresh.app" --web-dir www
          npx cap add android
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mayuresh-Garments-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
